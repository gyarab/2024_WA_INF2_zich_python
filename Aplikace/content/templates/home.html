<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engine CMS - Home</title>
    <link rel="stylesheet" href="{% static 'styles.css' %}">
</head>
<body>
    {% extends 'base.html' %}

    {% block content %}
    <h1>Welcome to the Engine CMS</h1>
    <h2>List of Engines</h2>
    <ul>
        {% for engine in engines %}
            <li>
                <a href="{% url 'engine_detail' engine.id %}">{{ engine.name }}</a>
            </li>
        {% endfor %}
    </ul>
    {% endblock %}
</body>
</html>
